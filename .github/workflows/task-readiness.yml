name: task-readiness

on:
  pull_request:

permissions:
  contents: read

jobs:
  readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Validate task readiness
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python3 scripts/check_task_readiness.py
