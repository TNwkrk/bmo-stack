version: '3.8'

# This docker-compose file defines OPTIONAL auxiliary services for the BMO Stack.
# The core BMO Stack does NOT require Docker:
#   - Host OpenClaw handles Telegram (runs on host)
#   - Worker sandbox (bmo-tron) is managed by OpenShell/NemoClaw on host
#   - Context lives in ~/bmo-context (outside containers)
#
# If you want to run auxiliary services (e.g., a PostgreSQL database for the worker),
# the services are already configured below. Just run `make up` to start them.
# Adjust environment variables in .env as needed.

services:
  postgres:
    image: postgres:15-alpine
    container_name: bmo_postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata: